<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Message Sent Successfully</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

body {
    margin: 0;
    padding: 0;
    font-family: "Poppins", sans-serif;
    color: #fff;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    text-align: center;

    /* Purple Glow Lighting Background */
    background: radial-gradient(circle at 50% 30%, rgba(180, 92, 255, 0.55), rgba(40, 0, 65, 0.95)),
                linear-gradient(135deg, #2d0050, #0a001b);
}
.container {
    max-width: 600px;
    padding: 40px;
    background: rgba(255, 255, 255, 0.05);
    border-radius: 20px;
    backdrop-filter: blur(6px);
    border: 1px solid rgba(255, 255, 255, 0.1);
    box-shadow: 0 0 25px rgba(200, 100, 255, 0.25);
}

h1 {
    font-size: 34px;
    font-weight: 600;
    margin-bottom: 15px;
}

p {
    font-size: 17px;
    opacity: 0.9;
    margin-bottom: 25px;
}

a.btn {
    display: inline-block;
    padding: 12px 30px;
    background: #b35bff;
    color: #fff;
    border-radius: 30px;
    text-decoration: none;
    font-weight: 600;
    transition: 0.3s;
}

a.btn:hover {
    background: #a04dff;
    box-shadow: 0 0 12px #b35bff;
}

</style>
</head>
<body>

<div class="container">
    <h1>Message Sent Successfully! 🎉</h1>
    <p>Thank you for contacting me. I will reply soon.</p>

    <a href="index.html" class="btn">Go Back to Home</a>
